<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Core | Gestión Inteligente</title>
    
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts: Syne (para un look moderno) -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-accent: #5efce8;
            --secondary-accent: #736efe;
            --bg-dark: #0f111a;
            --card-bg: rgba(23, 26, 43, 0.8);
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(115, 110, 254, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(94, 252, 232, 0.1) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            color: #ffffff;
            margin: 0;
        }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 3rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Adorno visual: Línea de gradiente superior */
        .auth-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--secondary-accent), var(--primary-accent));
        }

        .brand-logo-container {
            margin-bottom: 2.5rem;
        }

        .brand-name {
            font-weight: 800;
            font-size: 2.2rem;
            background: linear-gradient(135deg, #fff 30%, var(--primary-accent));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        /* Estilo de Inputs Minimalistas */
        .input-group-custom {
            margin-bottom: 1.5rem;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 14px 20px;
            color: white !important;
            font-weight: 500;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-accent);
            background: rgba(255, 255, 255, 0.06) !important;
            box-shadow: 0 0 20px rgba(94, 252, 232, 0.1);
        }

        /* Botón Estilo "Glass-Liquid" */
        .btn-login {
            background: #ffffff;
            color: var(--bg-dark);
            border: none;
            border-radius: 15px;
            padding: 14px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.4s ease;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background: var(--primary-accent);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(94, 252, 232, 0.3);
        }

        .toggle-password {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.4);
            z-index: 10;
        }

        .small-link {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .small-link:hover {
            color: var(--primary-accent);
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="brand-logo-container text-center">
            <h1 class="brand-name">Lumina Core</h1>
            <p class="text-white-50 small text-uppercase tracking-widest">Digital Solutions Ecosystem</p>
        </div>

        <div id="mensaje-error"></div>

        <form id="formLogin" method="POST" action="{% url 'validar_usuario' %}">
            {% csrf_token %}
            
            <div class="input-group-custom">
                <input type="text" class="form-control" name="usuario" placeholder="Nombre de usuario" required>
            </div>

            <div class="input-group-custom position-relative">
                <input type="password" class="form-control" id="contrasenaInput" name="contrasena" placeholder="Contraseña" required>
                <i class="bi bi-eye-slash toggle-password" id="iconoOjo"></i>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 px-1">
                <div class="form-check">
                    <input class="form-check-input bg-transparent border-secondary" type="checkbox" id="remember">
                    <label class="form-check-label small-link" for="remember">Recordarme</label>
                </div>
                <a href="#" class="small-link">¿Olvidaste el acceso?</a>
            </div>

            <button type="submit" class="btn btn-login w-100" id="btnSubmit">
                <span id="textoBtn">Entrar</span>
                <div class="spinner-border spinner-border-sm d-none ms-2" id="spinnerBtn"></div>
            </button>
        </form>

        <div class="mt-5 text-center">
            <span style="opacity: 0.3; font-size: 0.7rem; letter-spacing: 2px;">HUARAZ • PERÚ</span>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        // Visibilidad de contraseña
        $('#iconoOjo').on('click', function() {
            const input = $('#contrasenaInput');
            const type = input.attr('type') === 'password' ? 'text' : 'password';
            input.attr('type', type);
            $(this).toggleClass('bi-eye-slash bi-eye');
            if(type === 'text') $(this).css('color', '#5efce8');
            else $(this).css('color', 'rgba(255, 255, 255, 0.4)');
        });

        // Lógica AJAX
        $('#formLogin').on('submit', function(e) {
            e.preventDefault();
            const btn = $('#btnSubmit'), txt = $('#textoBtn'), sp = $('#spinnerBtn');
            
            txt.text('Verificando...');
            sp.removeClass('d-none');
            btn.addClass('disabled');
            $('#mensaje-error').empty();

            $.ajax({
                type: 'POST',
                url: $(this).attr('action'),
                data: $(this).serialize(),
                success: function(response) {
                    if (response.success) {
                        window.location.href = response.redirect_url;
                    } else {
                        $('#mensaje-error').html(`
                            <div class="alert bg-dark text-danger border-0 small mb-4 text-center" style="border-radius: 12px; background: rgba(255,0,0,0.1) !important;">
                                <i class="bi bi-shield-lock me-2"></i> ${response.mensaje}
                            </div>
                        `);
                        txt.text('Entrar');
                        sp.addClass('d-none');
                        btn.removeClass('disabled');
                    }
                },
                error: function() {
                    alert("Error en el enlace con Lumina.");
                    txt.text('Entrar');
                    sp.addClass('d-none');
                    btn.removeClass('disabled');
                }
            });
        });
    </script>
</body>
</html>
